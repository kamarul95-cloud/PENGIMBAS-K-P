<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengimbas IC Pro</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { --primary: #059669; --dark: #111827; --bg: #1f2937; --text: #f9fafb; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
    .header { width: 100%; background-color: var(--dark); padding: 16px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .steps { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
    .step-badge { background: #374151; color: #9ca3af; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .step-badge.active { background: var(--primary); color: white; }
    .step-badge.done { background: #047857; color: #a7f3d0; }
    .scanner-container { position: relative; width: 90vw; max-width: 500px; height: 60vh; background: #000; border-radius: 16px; overflow: hidden; }
    #camera { width: 100%; height: 100%; object-fit: cover; }
    .overlay-border { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; aspect-ratio: 85.6 / 54; border: 2px dashed #34d399; border-radius: 10px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75); pointer-events: none; }
    .controls { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; margin-top: 20px; gap: 15px; }
    .btn-capture { width: 70px; height: 70px; border-radius: 50%; background: white; border: 5px solid #d1d5db; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .btn-upload { background: var(--primary); width: 80%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: none; }
    .preview-box { background: #111827; border: 1px solid #374151; aspect-ratio: 1.58; width: 45%; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
    .result-panel { background: #111827; padding: 20px; border-radius: 12px; width: 90vw; max-width: 500px; display: none; text-align: center; }
  </style>
</head>
<body>

  <div class="header"><h3><i class="fas fa-id-card"></i> Pengimbas A4 Pintar</h3></div>

  <div class="steps">
    <div class="step-badge active" id="badge-1">1. Depan</div>
    <div class="step-badge" id="badge-2">2. Belakang</div>
    <div class="step-badge" id="badge-3">3. Siap</div>
  </div>

  <div class="scanner-container" id="scannerUI">
    <video id="camera" autoplay playsinline></video>
    <div class="overlay-border"></div>
  </div>

  <div class="controls" id="controlUI">
    <button class="btn-capture" id="captureBtn" onclick="snapPhoto()"></button>
    <div style="display:flex; gap:10px; width: 90%; justify-content: center;">
        <button class="btn-small" onclick="retake()">Reset</button>
        <button class="btn-small" onclick="switchCamera()">Pusing</button>
    </div>
    <div style="display:flex; width: 90%; gap: 10px;">
        <div class="preview-box" id="prev-front">Depan</div>
        <div class="preview-box" id="prev-back">Belakang</div>
    </div>
    <button class="btn-upload" id="uploadBtn" onclick="processAndUpload()">Gabung & Upload</button>
  </div>

  <div class="result-panel" id="resultUI">
    <h3>Muat Naik Berjaya!</h3>
    <input type="text" id="finalUrl" style="width:100%; margin:10px 0; padding:10px;" readonly>
    <button onclick="copyToClipboard()" style="padding:10px 20px; background:var(--primary); border:none; color:white; border-radius:5px;">Salin Link</button>
  </div>

  <canvas id="tempCanvas" style="display:none;"></canvas>
  <canvas id="finalCanvas" style="display:none;"></canvas>

  <script>
    let stream, facingMode = "environment", currentStep = 1, imgFront = null, imgBack = null;

    document.addEventListener("DOMContentLoaded", startCamera);

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } } });
      document.getElementById('camera').srcObject = stream;
    }

    function snapPhoto() {
      const video = document.getElementById('camera'), canvas = document.getElementById('tempCanvas'), ctx = canvas.getContext('2d');
      const icRatio = 85.6 / 54;
      let cropWidth = video.videoWidth * 0.85, cropHeight = cropWidth / icRatio;
      canvas.width = cropWidth; canvas.height = cropHeight;
      ctx.drawImage(video, (video.videoWidth-cropWidth)/2, (video.videoHeight-cropHeight)/2, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

      if (currentStep === 1) {
        imgFront = dataUrl;
        document.getElementById('prev-front').style.backgroundImage = `url(${imgFront})`;
        currentStep = 2;
        document.getElementById('badge-1').className = "step-badge done";
        document.getElementById('badge-2').className = "step-badge active";
        Swal.fire('Bahagian Depan OK!', 'Sekarang sila pusingkan IC dan tangkap bahagian BELAKANG.', 'success');
      } else {
        imgBack = dataUrl;
        document.getElementById('prev-back').style.backgroundImage = `url(${imgBack})`;
        document.getElementById('badge-2').className = "step-badge done";
        document.getElementById('badge-3').className = "step-badge active";
        document.getElementById('captureBtn').style.display = "none";
        document.getElementById('uploadBtn').style.display = "block";
        Swal.fire('Belakang OK!', 'Semua gambar sedia. Tekan Gabung & Upload.', 'success');
      }
    }

    function processAndUpload() {
      Swal.fire({ title: 'Memproses A4...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const iF = new Image(); iF.src = imgFront;
      const iB = new Image(); iB.src = imgBack;
      iF.onload = () => iB.onload = () => {
        const canvas = document.getElementById('finalCanvas'), ctx = canvas.getContext('2d');
        const a4Width = 1200, a4Height = Math.round(a4Width * 1.414);
        canvas.width = a4Width; canvas.height = a4Height;
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, a4Width, a4Height);
        const drawW = a4Width * 0.407, drawH = drawW / 1.585;
        const posX = (a4Width - drawW) / 2;
        ctx.drawImage(iF, posX, a4Height * 0.15, drawW, drawH);
        ctx.drawImage(iB, posX, a4Height * 0.55, drawW, drawH);
        
        const fd = new FormData();
        fd.append("image", canvas.toDataURL('image/jpeg', 0.9).split(',')[1]);
        fetch('https://api.imgbb.com/1/upload?key=6b09e2ede4edffb50fd81e97070a1028', { method: 'POST', body: fd })
        .then(r => r.json()).then(res => {
            Swal.fire({ title: 'Berjaya!', text: 'Pautan sudah siap.', icon: 'success' });
            document.getElementById('scannerUI').style.display = "none";
            document.getElementById('controlUI').style.display = "none";
            document.getElementById('resultUI').style.display = "block";
            document.getElementById('finalUrl').value = res.data.url;
        });
      };
    }

    function retake() { window.location.reload(); }
    function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('finalUrl').value); Swal.fire('Disalin!', '', 'success'); }
    function switchCamera() { facingMode = facingMode === "environment" ? "user" : "environment"; startCamera(); }
  </script>
</body>
</html>
